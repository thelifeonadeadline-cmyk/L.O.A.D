<!DOCTYPE html>
<html>
<head>
    <title>Test Forgot Password</title>
</head>
<body>
    <h2>Test Forgot Password</h2>
    <input type="email" id="testEmail" placeholder="Enter email to test">
    <button onclick="testForgotPassword()">Test Reset</button>
    <div id="result"></div>

    <script type="module">
        import { auth } from './firebase-config.js';
        import { sendPasswordResetEmail } from "https://www.gstatic.com/firebasejs/11.9.1/firebase-auth.js";

        window.testForgotPassword = async function() {
            const email = document.getElementById('testEmail').value;
            const result = document.getElementById('result');
            
            if (!email) {
                result.innerHTML = '<p style="color: red;">Please enter an email</p>';
                return;
            }

            try {
                console.log('Attempting to send reset email to:', email);
                await sendPasswordResetEmail(auth, email);
                result.innerHTML = '<p style="color: green;">✅ Reset email sent successfully!</p>';
                console.log('Reset email sent successfully');
            } catch (error) {
                console.error('Error sending reset email:', error);
                result.innerHTML = `<p style="color: red;">❌ Error: ${error.message}</p>`;
            }
        }
    </script>
</body>
</html>
